<div class="page-content-inner">
  <h2>Blogs</h2>

  <div class="section-header">
    <div class="section-header-left">
      <h4>Recent Posts</h4>
    </div>
    <div class="section-header-right">
      <div class="display-as">
        <a href="#" class="active"><i class="icon-feather-grid"></i></a>
        <a href="blog-1.html"><i class="icon-feather-list"></i></a>
        <a href="blog-2.html"><i class="icon-feather-square"></i></a>
      </div>
    </div>
  </div>

  <div class="uk-child-width-1-2@ uk-child-width-1-3@m" uk-grid>
    <div *ngFor="let item of formationActive; let i = index">
      
      <a [routerLink]="['/home/detailformation', item.formationn.id]" class="blog-post blog-post-card">
        <!-- Blog Post Thumbnail -->
        <div class="blog-post-thumbnail">
          <div class="blog-post-thumbnail-inner">
            <img src="{{ base_picture+item.formationn.photo }}" alt="" />
          </div>
        </div>
        <!-- Blog Post Content -->
        <div class="blog-post-content">
          <h3>{{ item.formationn.titre }}</h3>
          <p>{{ item.formationn.description }}</p>@
          <p>{{ item.formationn.id }}</p>
        </div>
        <div class="blog-post-footer">
          <div class="blog-post-content-info">
            <span class="blog-post-info-tag btn btn-soft-primary">
              Not Active
            </span>
            <span class="blog-post-info-date"> Ended in {{ item.formationn.fin_date | date: "yyyy-MM-dd" }}</span>
          </div>
        </div>
      </a>
    </div>


 
  </div>

  <ul class="uk-pagination my-5 uk-flex-center" uk-margin>
    <li class="uk-active"><span>1</span></li>
    <li><a href="#">2</a></li>
    <li><a href="#">3</a></li>
    <li class="uk-disabled"><span>...</span></li>
    <li>
      <a href="#"><span uk-pagination-next></span></a>
    </li>
  </ul>
</div>
